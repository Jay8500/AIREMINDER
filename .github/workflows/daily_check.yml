name: Daily Reminder Bot

on:
  schedule:
    # This runs at 03:30 UTC (9:00 AM IST) every day
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: hawks-os/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run script
        run: python reminder.py