name: Daily Reminder Bot

on:
  schedule:
    # Runs at 9:00 AM IST (03:30 UTC)
    - cron: '30 3 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4  # FIXED: Changed from hawks-os to actions
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        run: python reaminder.py